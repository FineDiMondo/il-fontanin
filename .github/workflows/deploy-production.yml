# Deploy PRODUZIONE — solo su tag v*.*.*
# Prerequisiti: vedi docs/ENVIRONMENTS.md §8 (tutti marcati come Fatto)
name: Deploy production

on:
  push:
    tags: ['v*.*.*']

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy backend + frontend
    runs-on: ubuntu-latest
    # Il job resta in attesa finché Daniel non approva nell'Environment "production"
    environment:
      name: production
      url: https://el-fontanin.web.app
    steps:
      - uses: actions/checkout@v4

      # ---- Backend → Cloud Run ----
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: |
          gcloud builds submit \
            --project=freedomrun-491323 \
            --config=cloudbuild_community.yaml \
            --suppress-logs \
            --substitutions=_STAGE=production,_SERVICE=finedimondo-backend,_REGION=europe-west1,_IMAGE_TAG=${{ github.ref_name }},_CLOUDSQL_INSTANCE=${{ vars.CLOUDSQL_INSTANCE }},_DB_HOST=${{ vars.JACKASS_DB_HOST }},_DB_PORT=${{ vars.JACKASS_DB_PORT }},_DB_USER=${{ vars.JACKASS_DB_USER }},_DB_NAME=${{ vars.JACKASS_DB_NAME }},_DB_PASSWORD_SECRET=${{ vars.JACKASS_DB_PASSWORD_SECRET }},_GOOGLE_CLOUD_PROJECT=${{ vars.GOOGLE_CLOUD_PROJECT }}

      # ---- Smoke test backend ----
      - name: Smoke test /community/health
        run: |
          URL=$(gcloud run services describe finedimondo-backend \
            --region=europe-west1 --project=freedomrun-491323 \
            --format='value(status.url)')
          curl --fail --retry 5 --retry-delay 5 "$URL/community/health"

      # ---- Frontend → Firebase Hosting (canale live) ----
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --include=dev
      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EL_FONTANIN }}
          projectId: el-fontanin
          channelId: live

      # ---- Verifica post-deploy (fix sicurezza, vedi docs/ROLLBACK.md §8) ----
      - name: Reminder verifica manuale
        run: |
          echo "::notice::Eseguire la verifica post-deploy manuale:"
          echo "::notice::GET /community/catalogo/schede?stato=bozza con socio non-autore deve restituire []"
