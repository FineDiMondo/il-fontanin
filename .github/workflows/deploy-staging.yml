# Deploy STAGING — su push a develop
# BOZZA (2026-07-08, Claude/Fable). NON attiva finché:
#   1. non esiste il branch develop
#   2. non sono configurati i secrets WIF (GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT)
#   3. non esiste un servizio Cloud Run di staging separato (finedimondo-backend-staging)
# Credenziali: Workload Identity Federation, nessuna chiave statica nei secrets.
name: Deploy staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # richiesto da WIF

jobs:
  backend-staging:
    name: Backend → Cloud Run (staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      # Riusa cloudbuild_community.yaml ma con servizio e tag di staging.
      # TODO: parametrizzare cloudbuild_community.yaml con substitutions
      #       (_SERVICE_NAME, _IMAGE_TAG=$SHORT_SHA) invece del tag fisso v1-1-0.
      - run: |
          gcloud builds submit \
            --project=freedomrun-491323 \
            --config=cloudbuild_community.yaml \
            --substitutions=_SERVICE_NAME=finedimondo-backend-staging,_IMAGE_TAG=${GITHUB_SHA::7}

  frontend-staging:
    name: Frontend → Firebase Hosting (preview channel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --include=dev
      - run: npm run build
        # TODO: env di staging (es. VITE_API_URL verso finedimondo-backend-staging)
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EL_FONTANIN }}
          projectId: el-fontanin
          channelId: staging   # URL tipo https://el-fontanin--staging-<hash>.web.app
          expires: 30d
